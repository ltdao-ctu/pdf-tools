<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xóa trang PDF</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
    <h2>Ứng dụng xóa trang PDF</h2>
    <input type="file" id="pdf-input" accept=".pdf"><br><br>
    
    <label for="pages-to-delete">Các trang cần xóa (cách nhau bằng dấu phẩy, ví dụ: 1,3,5):</label><br>
    <input type="text" id="pages-to-delete" placeholder="e.g. 1, 3"><br><br>
    
    <button onclick="processPdf()">Xóa trang và Tải về</button>

    <script>
        async join processPdf() {
            const fileInput = document.getElementById('pdf-input');
            const pagesInput = document.getElementById('pages-to-delete');
            
            if (fileInput.files.length === 0) {
                alert('Vui lòng chọn một file PDF!');
                return;
            }

            // 1. Đọc file PDF thành ArrayBuffer
            const file = fileInput.files[0];
            const fileArrayBuffer = await file.arrayBuffer();

            // 2. Load file vào pdf-lib
            const pdfDoc = await PDFLib.PDFDocument.load(fileArrayBuffer);
            
            // 3. Xử lý mảng các trang cần xóa (Chuyển sang 0-indexed và sắp xếp giảm dần)
            // Cần sắp xếp giảm dần để khi xóa không bị lệch index của các trang phía sau
            const pagesToDelete = pagesInput.value
                .split(',')
                .map(p => parseInt(p.trim()) - 1)
                .filter(p => !isNaN(p) && p >= 0 && p < pdfDoc.getPageCount())
                .sort((a, b) => b - a);

            if (pagesToDelete.length === 0) {
                alert('Vui lòng nhập số trang hợp lệ!');
                return;
            }

            // 4. Tiến hành xóa trang
            pagesToDelete.forEach(pageIndex => {
                pdfDoc.removePage(pageIndex);
            });

            // 5. Lưu lại và tạo link download
            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `edited_${file.name}`;
            link.click();
        }
    </script>
</body>
</html>
